<!DOCTYPE html>
<html>
<head><title>Add Task</title>
<style>
body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; background: #f8fafc; }
h1 { color: #1a2744; }
label { font-weight: bold; display: block; margin-top: 12px; color: #334155; }
input, textarea { width: 100%; padding: 10px; margin: 6px 0; box-sizing: border-box; border: 1px solid #e2e8f0; border-radius: 4px; }
button { padding: 12px 24px; background: #0d9488; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 15px; }
a { color: #0d9488; }
.flash { padding: 10px; margin: 10px 0; border-radius: 4px; }
.success { background: #d1fae5; color: #065f46; }
.error { background: #fee2e2; color: #991b1b; }
</style></head>
<body>
{% with messages = get_flashed_messages(with_categories=true) %}
{% for category, message in messages %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}
{% endwith %}
<h1>Add New Task</h1>
<form method="POST">
  <label>Title (required):</label><input type="text" name="title" required>
  <label>Description:</label><textarea name="description" rows="3"></textarea>
  <label>Due Date:</label><input type="date" name="due_date">
  <button type="submit">Add Task</button>
</form>
<p style="margin-top:15px;"><a href="/dashboard">Back to Dashboard</a></p>
</body></html>
