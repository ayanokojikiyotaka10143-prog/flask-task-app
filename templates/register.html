<!DOCTYPE html>
<html>
<head><title>Register</title>
<style>
body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; background: #f8fafc; }
h1 { color: #1a2744; }
input { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; border: 1px solid #e2e8f0; border-radius: 4px; }
button { padding: 10px 20px; background: #0d9488; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; }
a { color: #0d9488; }
.flash { padding: 10px; margin: 10px 0; border-radius: 4px; }
.success { background: #d1fae5; color: #065f46; }
.error { background: #fee2e2; color: #991b1b; }
</style></head>
<body>
{% with messages = get_flashed_messages(with_categories=true) %}
{% for category, message in messages %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}
{% endwith %}
<h1>Register</h1>
<form method="POST">
  <label>Username:</label><input type="text" name="username" required>
  <label>Password:</label><input type="password" name="password" required>
  <button type="submit">Register</button>
</form>
<p><a href="/login">Already have an account? Login</a></p>
</body></html>
